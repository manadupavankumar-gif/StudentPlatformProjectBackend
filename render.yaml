services:
  # Web Service
  - type: web
    name: student-platform-backend
    runtime: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/student-platform-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: student-platform-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: PORT
        value: 8080

  # PostgreSQL Database
  - type: postgres
    name: student-platform-db
    plan: free
    databaseName: studentplatform
    user: studentplatform_user
    ipAllowList: []
